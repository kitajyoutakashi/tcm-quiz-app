<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日中鍼認定Basic therapist練習ページ</title>
    <style>
        :root { --main-color: #2c3e50; --accent-color: #27ae60; --error-color: #e74c3c; --bg-color: #f4f7f6; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: var(--bg-color); color: var(--main-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; max-width: 600px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .hidden { display: none; }
        h1 { font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; color: var(--main-color); }
        input[type="password"], select { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { background-color: var(--accent-color); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 10px 5px; transition: 0.3s; min-width: 120px; }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .ox-container { display: flex; justify-content: center; gap: 30px; margin: 25px 0; }
        .btn-o { background-color: #3498db; font-size: 2.5rem; width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }
        .btn-x { background-color: #e67e22; font-size: 2.5rem; width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }
        #feedback { font-weight: bold; font-size: 1.5rem; margin: 15px 0; min-height: 1.6em; }
        #explanation-box { background: #e8f6ef; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; border-left: 5px solid var(--accent-color); font-size: 0.95rem; line-height: 1.6; }
        .range-label { display: block; margin-top: 25px; font-weight: bold; }
        #range-value { color: var(--accent-color); font-size: 1.4rem; }
        input[type="range"] { width: 90%; margin: 15px 0; cursor: pointer; }
        #quiz-header { font-size: 0.85rem; color: #888; margin-bottom: 5px; text-align: right; }
        #category-tag { display: inline-block; background: var(--main-color); color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login">
        <h1>日中鍼認定Basic Therapist 問題トレーニング・ログイン</h1>
        <p>パスワードを入力してください</p>
        <input type="password" id="password-input" placeholder="Password">
        <br>
        <button onclick="checkPassword()">ログイン</button>
    </div>

    <div id="view-setup" class="hidden">
        <h1>学習設定</h1>
        <p>学習したい分野を選択してください</p>
        <select id="category-select">
            <option value="すべて">すべての分野</option>
        </select>
        
        <label class="range-label">出題問題数を決めてください。: <span id="range-value">10</span>問</label>
        <input type="range" id="question-range" min="1" max="50" value="10" oninput="updateRangeText(this.value)">
        
        <br>
        <button onclick="startQuiz()">学習を開始する</button>
    </div>

    <div id="view-quiz" class="hidden">
        <div id="quiz-header"></div>
        <div id="category-tag"></div>
        <div id="question-text" style="font-size: 1.25rem; margin: 25px 0; min-height: 100px; font-weight: 500; line-height: 1.5;"></div>
        
        <div class="ox-container">
            <button id="btn-choice-o" class="btn-o" onclick="judge('〇')">〇</button>
            <button id="btn-choice-x" class="btn-x" onclick="judge('×')">×</button>
        </div>
        
        <div id="feedback"></div>
        
        <div style="margin-top: 20px;">
            <button id="btn-explanation" class="hidden" style="background-color: #7f8c8d;" onclick="toggleExplanation()">解説を見る</button>
            <button id="btn-next" class="hidden" onclick="nextQuestion()">次の問題へ</button>
        </div>
        <div id="explanation-box" class="hidden"></div>
    </div>

    <div id="view-result" class="hidden">
        <h1>学習終了</h1>
        <div id="score-display" style="font-size: 1.8rem; margin: 30px 0; line-height: 1.4;"></div>
        <button onclick="location.reload()">分野選択に戻る</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let targetQuestions = [];
    let currentIndex = 0;
    let score = 0;
    const PASS = "nicchushin2026"; // パスワード

    // JSONデータの読み込み
    fetch('questions.json')
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            allQuestions = data;
            const categories = [...new Set(data.map(q => q.category))];
            const select = document.getElementById('category-select');
            categories.forEach(cat => {
                if(cat) {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    select.appendChild(opt);
                }
            });
        })
        .catch(error => {
            console.error('Error loading JSON:', error);
            alert('問題データの読み込みに失敗しました。JSONの形式を確認してください。');
        });

    function checkPassword() {
        const input = document.getElementById('password-input').value;
        if(input === PASS) {
            showView('view-setup');
        } else {
            alert("パスワードが正しくありません");
        }
    }

    function updateRangeText(val) {
        document.getElementById('range-value').textContent = val;
    }

    function showView(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function startQuiz() {
        const cat = document.getElementById('category-select').value;
        const num = parseInt(document.getElementById('question-range').value);
        
        targetQuestions = allQuestions.filter(q => cat === "すべて" || q.category === cat);
        // ランダムシャッフル
        targetQuestions = targetQuestions.sort(() => Math.random() - 0.5).slice(0, num);
        
        if (targetQuestions.length === 0) {
            alert("該当する問題がありませんでした");
            return;
        }

        currentIndex = 0;
        score = 0;
        showView('view-quiz');
        showQuestion();
    }

    function showQuestion() {
        const q = targetQuestions[currentIndex];
        document.getElementById('quiz-header').textContent = `問題 ${currentIndex + 1} / 全 ${targetQuestions.length} 問`;
        document.getElementById('category-tag').textContent = q.category;
        document.getElementById('question-text').textContent = q.question;
        document.getElementById('feedback').textContent = "";
        document.getElementById('explanation-box').classList.add('hidden');
        document.getElementById('btn-explanation').classList.add('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        document.querySelectorAll('.ox-container button').forEach(b => b.disabled = false);
    }

    function judge(choice) {
        const q = targetQuestions[currentIndex];
        const feedback = document.getElementById('feedback');
        document.querySelectorAll('.ox-container button').forEach(b => b.disabled = true);
        
        // 判定ロジックの強化: 空白除去と記号のゆらぎ吸収
        const cleanAnswer = q.answer.trim().replace(/[◯○]/g, '〇'); 
        const cleanChoice = choice.trim().replace(/[◯○]/g, '〇');

        if(cleanChoice === cleanAnswer) {
            feedback.textContent = "正解！";
            feedback.style.color = "var(--accent-color)";
            score++;
        } else {
            feedback.textContent = "不正解...";
            feedback.style.color = "var(--error-color)";
        }
        document.getElementById('btn-explanation').classList.remove('hidden');
        document.getElementById('btn-next').classList.remove('hidden');
    }

    function toggleExplanation() {
        const box = document.getElementById('explanation-box');
        box.textContent = targetQuestions[currentIndex].explanation;
        box.classList.toggle('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if(currentIndex < targetQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        showView('view-result');
        const percent = Math.round((score / targetQuestions.length) * 100);
        document.getElementById('score-display').innerHTML = 
            `正答率: <span style="color:var(--accent-color); font-weight:bold;">${percent}%</span><br>` +
            `<span style="font-size:1.2rem;">${targetQuestions.length}問中 ${score}問 正解</span>`;
    }
</script>

</body>
</html>
